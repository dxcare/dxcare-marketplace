    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
            background: #000; color: #f5f5f7;
            min-height: 100vh;
            padding: clamp(1.5rem, 4vw, 4rem);
        }
        .gallery-header { text-align: center; margin-bottom: clamp(2rem, 4vw, 4rem); }

        .gallery-header p { color: #86868b; font-size: clamp(0.85rem, 1.5vw, 1.1rem); }
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
            gap: clamp(1rem, 2vw, 1.5rem);
        }
        .theme-card {

            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.15);
        }
        .preview {
            aspect-ratio: 16/10; position: relative; overflow: hidden;
            padding: 1.5rem; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .card-footer {
            padding: 0.8rem 1.2rem;
            background: rgba(255,255,255,0.03);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-between; align-items: center;

        .card-footer .name { font-size: 0.85rem; font-weight: 600; }
        .card-footer .meta { font-size: 0.65rem; color: #86868b; margin-top: 2px; }
        .card-footer .tags { display: flex; gap: 0.3rem; }

</head>

                    <div style="font-size:1.6rem;font-weight:800;color:#F5F7F9;font-family:'Pretendard Variable',Pretendard,sans-serif;letter-spacing:-0.02em;line-height:1.1;">신뢰감 있는<br>비즈니스 보고</div>
                    <div style="font-size:0.55rem;color:#94A3B0;font-family:'Pretendard Variable',Pretendard,sans-serif;margin-top:0.4rem;">딥 틸 블루 · 정돈된 기본 톤</div>
                </div>`
        },
        /* ── Warm (base) ── */
        {
            id: 'warm', name: 'Warm',
            cat: ['교육', '편안'], meta: 'Fraunces · radius 24px',
            html: `
                <div style="position:absolute;inset:0;background:#2B1E16;"></div>
                <div style="position:absolute;top:12%;left:8%;width:34px;height:34px;border-radius:50%;background:radial-gradient(circle,rgba(226,169,59,0.35),transparent 70%);"></div>
                <div style="position:relative;padding:1.3rem 1.5rem;height:100%;display:flex;flex-direction:column;justify-content:center;">
                    <div style="width:30px;height:3px;background:#E2A93B;margin-bottom:0.5rem;border-radius:2px;"></div>
                    <div style="font-family:'Fraunces',serif;font-size:1.7rem;font-weight:700;color:#FDF6EC;line-height:1.15;">따뜻한 배움의<br>이야기</div>
                    <div style="font-family:'Pretendard Variable',Pretendard,sans-serif;font-size:0.55rem;color:#A88E7A;margin-top:0.5rem;">세리프 헤딩 · 크림 + 앰버</div>
                    <div style="display:flex;gap:0.4rem;margin-top:0.6rem;">
                        <span style="width:18px;height:18px;border-radius:50%;background:#E2A93B;display:block;"></span>
                        <span style="width:18px;height:18px;border-radius:50%;background:#C4533A;display:block;"></span>
                    </div>
                </div>`
        },
        /* ── Minimal (base) ── */
        {
            id: 'minimal', name: 'Minimal',
            cat: ['미니멀', '중립'], meta: 'Inter · radius 4px',
            html: `
                <div style="position:absolute;inset:0;background:#111111;"></div>
                <div style="position:relative;padding:1.5rem;height:100%;display:flex;flex-direction:column;justify-content:center;">
                    <div style="font-size:0.5rem;font-weight:600;letter-spacing:0.18em;color:#888888;font-family:'Inter',sans-serif;margin-bottom:0.6rem;">MINIMAL</div>
                    <div style="font-family:'Inter',sans-serif;font-size:1.8rem;font-weight:700;color:#F5F5F5;line-height:1.1;letter-spacing:-0.02em;">절제된 여백<br>타이포 중심</div>
                    <div style="width:48px;height:1px;background:#555555;margin:0.7rem 0;"></div>
                    <div style="font-family:'Inter',sans-serif;font-size:0.55rem;color:#888888;">순수 흑백 · 장식 최소</div>
                </div>`
        },
        /* ── Keynote Dark (base) ── */
        {
            id: 'keynote-dark', name: 'Keynote Dark',
            cat: ['투자', '프리미엄'], meta: 'Pretendard · radius 20px',
            html: `
                <div style="position:absolute;inset:0;background:#000000;"></div>
                <div style="position:relative;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;">
                    <div style="font-size:0.5rem;font-weight:700;letter-spacing:0.15em;color:#2997ff;font-family:'Pretendard Variable',Pretendard,sans-serif;margin-bottom:0.6rem;">KEYNOTE DARK</div>
                    <div style="font-size:1.9rem;font-weight:800;color:#f5f5f7;font-family:'Pretendard Variable',Pretendard,sans-serif;letter-spacing:-0.03em;line-height:1.05;">순수 블랙<br><span style="color:#2997ff;">극장형</span> 무대</div>
                    <div style="font-size:0.6rem;color:#86868b;font-family:'Pretendard Variable',Pretendard,sans-serif;margin-top:0.5rem;">대형 화면 발표용 · 고대비</div>
                </div>`
        }
    ];

    grid.innerHTML = cards.map(c => `
        <a href="./${c.id}.html" class="theme-card">
            <div class="preview">${c.html}</div>
            <div class="card-footer">
                <div>
                    <div class="name">${c.name}</div>
                    <div class="meta">${c.meta}</div>
                </div>
                <div class="tags">${c.cat.map(t => `<span class="cat-tag">${t}</span>`).join('')}</div>
            </div>
        </a>
    `).join('');

    document.getElementById('gallery-subtitle').textContent =
        cards.length + ' 프리셋 테마 — 클릭하면 풀사이즈 샘플 페이지로 이동';
    </script>
</body>
</html>
